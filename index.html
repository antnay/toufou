<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>toufou</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="assets/images/heart.png" />
</head>

<body>
  <main id="app-main">
    <div id="game-viewport">
      <canvas id="gameCanvas" width="600" height="800"></canvas>
      <div id="ui-layer">
        <h1 id="title">Toufou</h1>
        <p id="subtitle">Bullet Hell</p>
        <button id="btn">Start</button>
        <button id="btn-leaderboard">Leaderboard</button>
      </div>
      <div id="game-over-layer" style="display:none;">
        <p class="game-over-text">You died</p>
        <p id="game-over-score" class="game-over-score">000000000</p>
        <input type="text" id="username-input-gg" class="username-input" placeholder="Enter Username (max 12)"
          maxlength="12" />
        <button id="btn-submit-score-gg">Submit Score</button>
        <button id="btn-back">Back to menu</button>
      </div>
      <div id="you-won-layer" style="display:none;">
        <p class="game-over-text">You won</p>
        <p id="you-won-score" class="game-over-score">000000000</p>
        <input type="text" id="username-input" class="username-input" placeholder="Enter Username (max 12)"
          maxlength="12" />
        <button id="btn-submit-score">Submit Score</button>
        <button id="btn-won-back">Back to menu</button>
      </div>
      <div id="leaderboard-layer" style="display:none;">
        <p class="leaderboard-title">Leaderboard</p>
        <ol id="leaderboard-list"></ol>
        <button id="btn-leaderboard-close">Back</button>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
